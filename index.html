<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мои заметки</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      font-size: 16px;
      line-height: 1.4;
    }
    
    .post {
      margin-bottom: 20px;
      padding: 15px;
      border-bottom: 1px solid #333;
      background: #111;
      border-radius: 8px;
      transition: background 0.2s;
    }
    
    .post:active {
      background: #222;
    }
    
    .time {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    
    .post-preview {
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    /* Полноэкранный режим */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }
    
    .modal-content {
      max-width: 100%;
    }
    
    .modal-time {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }
    
    .modal-text {
      font-size: 20px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 40px;
    }
    
    .close-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #333;
      color: #fff;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
    }
    
    .close-btn:active {
      background: #555;
    }
    
    .hint {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-top: 20px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div id="posts">Загрузка...</div>
  <div class="hint">👆 Нажми на пост для полного просмотра</div>
  
  <!-- Полноэкранное модальное окно -->
  <div id="fullScreenModal" class="modal">
    <button id="closeBtn" class="close-btn">×</button>
    <div class="modal-content">
      <div id="fullScreenTime" class="modal-time"></div>
      <div id="fullScreenText" class="modal-text"></div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
