<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      background: #f5f5f5;
    }
    
    h2 {
      margin-top: 0;
      color: #333;
    }
    
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
      font-size: 14px;
    }
    
    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
    }
    
    input[type="text"] {
      height: 44px;
    }
    
    textarea {
      height: 150px;
      resize: vertical;
      line-height: 1.5;
    }
    
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #007AFF;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    button {
      flex: 1;
      min-width: 120px;
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    #postBtn {
      background: #007AFF;
      color: white;
    }
    
    #postBtn:active {
      background: #0056b3;
      transform: scale(0.98);
    }
    
    #clearBtn {
      background: #ff3b30;
      color: white;
    }
    
    #clearBtn:active {
      background: #d63028;
      transform: scale(0.98);
    }
    
    #status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-weight: 500;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>➕ Новый пост</h2>
    
    <label for="titleInput">Заголовок (необязательно)</label>
    <input type="text" id="titleInput" placeholder="Введи заголовок...">
    
    <label for="textInput">Текст</label>
    <textarea id="textInput" placeholder="Введи текст..."></textarea>
    
    <div class="button-group">
      <button id="postBtn">📤 Опубликовать</button>
      <button id="clearBtn">🗑️ Очистить всё</button>
    </div>
    <div id="status"></div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
