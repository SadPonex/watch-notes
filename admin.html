<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      background: #007AFF;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:active {
      background: #0056b3;
    }
    #status {
      margin-top: 10px;
      color: #666;
    }
  </style>
</head>
<body>
  <h2>➕ Новый пост</h2>
  <textarea id="textInput" placeholder="Введи текст..."></textarea>
  <br>
  <button id="postBtn">Опубликовать</button>
  <div id="status"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
